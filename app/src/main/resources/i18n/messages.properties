setup.ai.guide.claude=1. Haz clic en "Obtener API Key" — se abrirá console.anthropic.com\n2. Inicia sesión o crea una cuenta en Anthropic\n3. Ve a Settings > API Keys\n4. Haz clic en "Create Key", ponle un nombre (ej: "OpenTermX")\n5. Copia la key generada (empieza con "sk-ant-...")\n6. Pégala aquí con el botón "Pegar" o Ctrl+V\n7. Haz clic en "Test connection" para verificar\nNota: necesitas agregar créditos en Billing para usar la API.
setup.ai.guide.openai=1. Haz clic en "Obtener API Key" — se abrirá platform.openai.com\n2. Inicia sesión con tu cuenta de OpenAI\n3. Ve a API Keys en el menú lateral\n4. Haz clic en "Create new secret key", ponle un nombre (ej: "OpenTermX")\n5. Copia la key generada (empieza con "sk-...")\n6. Pégala aquí con el botón "Pegar" o Ctrl+V\n7. Haz clic en "Test connection" para verificar\nNota: necesitas un plan de pago activo en platform.openai.com/account/billing
setup.ai.guide.gemini=1. Haz clic en "Obtener API Key" — se abrirá aistudio.google.com\n2. Inicia sesión con tu cuenta de Google\n3. Haz clic en "Get API Key" > "Create API key"\n4. Selecciona un proyecto de Google Cloud (o crea uno nuevo)\n5. Copia la key generada (empieza con "AIza...")\n6. Pégala aquí con el botón "Pegar" o Ctrl+V\n7. Haz clic en "Test connection" para verificar\nNota: Gemini ofrece un tier gratuito con límites de uso.
setup.ai.guide.ollama=1. Descarga Ollama desde https://ollama.com/download\n2. Instala y ejecuta Ollama (se inicia como servicio en segundo plano)\n3. Abre una terminal y ejecuta: ollama pull llama3:70b\n4. Espera a que se descargue el modelo\n5. Vuelve aquí y haz clic en "Refresh models" — el modelo aparecerá en el dropdown\nRequisitos: 8 GB RAM (modelos 7B), 32 GB+ (modelos 70B), GPU recomendada.
setup.ai.guide.lmstudio=1. Descarga LM Studio desde https://lmstudio.ai\n2. Instala y abre LM Studio\n3. Descarga un modelo (recomendado: Llama 3 o Qwen 2.5)\n4. Ve a "Local Server" y pulsa "Start Server" (puerto 1234)\n5. Vuelve aquí y pulsa "Refresh models"\nRequisitos: 8 GB RAM (modelos 7B), 32 GB+ (modelos 70B), GPU recomendada.

