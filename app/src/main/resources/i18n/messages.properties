# Help → Quick guide tabs (title + body)
help.guide.title=Guía rápida
help.guide.header=Pasos para empezar a usar COMPUHELP
help.shortcuts.title=Atajos de teclado en uso
help.shortcuts.header=Combinaciones registradas (puedes editarlas en Setup → Shortcuts…)
help.shortcuts.hint=Solo lectura. Para cambiar un atajo, abre Setup → Shortcuts… y edítalo desde allí.
help.systemInfo.title=Información del sistema
help.systemInfo.header=Datos del entorno y la JVM (útil para reportar problemas)
help.guide.firstSteps.title=Primeros pasos
help.guide.firstSteps.body=1) Archivo → Nueva conexión… elige protocolo (Serial, SSH, Telnet, TCP raw).\n2) Rellena host/puerto y credenciales en el diálogo de configuración.\n3) Abre el menú Setup → Window… para ajustar colores y transparencia.\n4) Abre Setup → Terminal… para cambiar tamaño, codificación y modo de scroll.\n5) Usa Window → Idioma para alternar Español/English.
help.guide.ssh.title=SSH
help.guide.ssh.body=• Soporte SSHv2 (jsch). SSH1 NO está soportado por motivos de seguridad.\n• Verificación de host por TOFU: la primera vez se pide confirmación; las siguientes se compara contra known_hosts.\n• Autenticación: contraseña, clave pública, agente. Setup → SSH Auth… define los defaults.\n• Port forwarding (Setup → SSH Forwarding…): reglas L (local) y R (remoto). Bind 0 = puerto dinámico.\n• SFTP en File → Abrir SFTP en sesión actual.\n• Generador de claves: Setup → Generar clave SSH…
help.guide.telnet.title=Telnet
help.guide.telnet.body=• Telnet plano y telnets (TLS). STARTTLS no soportado por la librería actual.\n• Negociación NAWS automática: el servidor recibe el tamaño del terminal cuando se redimensiona.\n• Terminal type configurable en Setup → TCP/IP…\n• Proxy SOCKS/HTTP en Setup → Proxy…
help.guide.serial.title=Serial
help.guide.serial.body=• Selecciona el puerto desde Setup → Puerto serial… o desde Nueva conexión.\n• Velocidades estándar 300–921 600 bps; data bits, paridad, stop bits y control de flujo configurables.\n• Señales DTR/RTS visibles y controlables en Control → Señales serial… (polling 400 ms).\n• Para enviar BREAK: Control → Enviar BREAK.
help.guide.tftp.title=TFTP
help.guide.tftp.body=• Cliente: Archivo → Transferir → Cliente TFTP… para PUT/GET con OACK, blksize y tsize.\n• Servidor: Archivo → Transferir → Servidor TFTP… (root configurable, permisos PUT/GET por archivo).\n• Las transferencias siguen vivas aunque cierres el diálogo: el badge "TFTP: N en curso" en la barra inferior abre el panel.\n• El badge "Servidor TFTP :PORT" indica que el servidor sigue arriba; sólo Stop lo apaga.
help.guide.macros.title=Macros
help.guide.macros.body=• Editor: Control → Editor de macros… (atajo Ctrl+M).\n• Lenguaje: Groovy + bridge MacroBaseScript (send, expect, sleep, prompt, log, tftp_*).\n• Macro al conectar: Setup → Adicional… → Auto-login macro.\n• Cada sesión puede tener su propio macro (campo en el diálogo del protocolo).
help.guide.transfer.title=Transferencias
help.guide.transfer.body=• XMODEM CRC-16: Control → Enviar XMODEM / Recibir XMODEM.\n• Capturar pantalla: Archivo → Capturar pantalla a PNG.\n• Exportar buffer (scrollback) a TXT: Archivo → Exportar buffer.\n• Log de sesión: Control → Iniciar log de sesión… (formato txt/html/raw, rotación por tamaño o tiempo).
help.guide.shortcuts.title=Atajos
help.guide.shortcuts.body=Atajos de fábrica:\n  Ctrl+N        Nueva pestaña vacía\n  Ctrl+Shift+S  Conexión serial\n  Ctrl+Shift+H  Conexión SSH\n  Ctrl+Shift+C  Copiar (terminal)\n  Ctrl+Shift+V  Pegar\n  Ctrl+M        Editor de macros\n  Ctrl+W        Cerrar pestaña\n  Ctrl+Q        Salir\n\nLista completa y editable en Setup → Shortcuts… o consulta en Ayuda → Atajos de teclado.

help.openSpec.missing.header=No se encontró el archivo de especificación
help.openSpec.missing.body=Se buscó la spec maestra en estas rutas y ninguna existe:\n{0}\n\nLa documentación viaja con el código fuente, no con la app instalada.
help.reportIssue.header=¿Cómo reportar un problema?
help.reportIssue.body=Copia el bloque de detalles (botón Copiar) y adjúntalo al ticket o correo. Incluye los pasos exactos para reproducirlo y, si es posible, el contenido del log de sesión.

