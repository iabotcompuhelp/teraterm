setup.ai.guide.claude=1. Click "Get API Key" — opens console.anthropic.com\n2. Sign in or create an Anthropic account\n3. Go to Settings > API Keys\n4. Click "Create Key", name it (e.g. "OpenTermX")\n5. Copy the generated key (starts with "sk-ant-...")\n6. Paste it here using the "Paste" button or Ctrl+V\n7. Click "Test connection" to verify\nNote: you need to add credits in Billing to use the API.
setup.ai.guide.openai=1. Click "Get API Key" — opens platform.openai.com\n2. Sign in to your OpenAI account\n3. Go to API Keys in the sidebar\n4. Click "Create new secret key", name it (e.g. "OpenTermX")\n5. Copy the generated key (starts with "sk-...")\n6. Paste it here using the "Paste" button or Ctrl+V\n7. Click "Test connection" to verify\nNote: requires an active paid plan at platform.openai.com/account/billing
setup.ai.guide.gemini=1. Click "Get API Key" — opens aistudio.google.com\n2. Sign in with your Google account\n3. Click "Get API Key" > "Create API key"\n4. Select a Google Cloud project (or create one)\n5. Copy the generated key (starts with "AIza...")\n6. Paste it here using the "Paste" button or Ctrl+V\n7. Click "Test connection" to verify\nNote: Gemini has a free tier with usage limits.
setup.ai.guide.ollama=1. Download Ollama from https://ollama.com/download\n2. Install and run Ollama (starts as a background service)\n3. Open a terminal and run: ollama pull llama3:70b\n4. Wait for the model to download\n5. Come back here and click "Refresh models" — the model will appear in the dropdown\nRequirements: 8 GB RAM (7B models), 32 GB+ (70B models), GPU recommended.
setup.ai.guide.lmstudio=1. Download LM Studio from https://lmstudio.ai\n2. Install and open LM Studio\n3. Download a model (recommended: Llama 3 or Qwen 2.5)\n4. Go to "Local Server" and click "Start Server" (port 1234)\n5. Come back here and click "Refresh models"\nRequirements: 8 GB RAM (7B models), 32 GB+ (70B models), GPU recommended.

# AI error messages (resolution table)
error.ai.401=Invalid or expired API Key. Make sure the key is complete and has no whitespace. Old keys may have expired.
error.ai.402=No credits or paid plan. Open the provider's billing console to add credits.
error.ai.403=Access denied — insufficient permissions. Your key lacks access to this model.
error.ai.404=Model not found. Pick another model or verify your plan includes it.
error.ai.429=Rate limit exceeded. Wait 60 seconds and try again.
error.ai.5xx=Provider server error. Retry in a few minutes.
error.ai.timeout=Timeout — no response from server. Check your internet connection.
error.ai.ssl=SSL certificate error. If you're behind an SSL-intercepting proxy, configure it in Setup → Proxy.
error.ai.connRefused=Connection refused. Make sure your firewall/antivirus isn't blocking outbound connections to the provider.
error.ai.dns=Could not resolve the domain. Check your internet connection and DNS configuration.
error.ai.keyFormat=Invalid API Key format. Expected prefix: sk-ant- (Claude), sk- (OpenAI), AIza (Gemini).
error.ai.noModels=No models installed.
error.ai.oom=Out of memory. Try a smaller model or close other apps.
error.ai.other=Error:

