about.details=Built with Kotlin 2.0, JavaFX 21 and JDK 21. Spec at .idea/Teraterm v3.md. Persistent settings under ~/.opentermx/.

# Help → Quick guide tabs (title + body)
help.guide.title=Quick guide
help.guide.header=How to start using COMPUHELP
help.shortcuts.title=Active keyboard shortcuts
help.shortcuts.header=Registered combinations (edit them under Setup → Shortcuts…)
help.shortcuts.hint=Read-only. To change a shortcut, open Setup → Shortcuts… and edit it there.
help.systemInfo.title=System information
help.systemInfo.header=Environment and JVM data (useful when reporting problems)
help.guide.firstSteps.title=First steps
help.guide.firstSteps.body=1) File → New connection… pick a protocol (Serial, SSH, Telnet, raw TCP).\n2) Fill in host/port and credentials in the configuration dialog.\n3) Open Setup → Window… to tune colors and transparency.\n4) Open Setup → Terminal… to change size, encoding and scroll mode.\n5) Use Window → Language to toggle Spanish/English.
help.guide.ssh.title=SSH
help.guide.ssh.body=• SSHv2 only (jsch). SSH1 is NOT supported for security reasons.\n• Host verification follows TOFU: the first time you accept; from then on the key is compared against known_hosts.\n• Auth: password, public key, agent. Setup → SSH Auth… sets defaults.\n• Port forwarding (Setup → SSH Forwarding…): L (local) and R (remote) rules. Bind 0 = dynamic port.\n• SFTP under File → Open SFTP in current session.\n• Key generator: Setup → Generate SSH key…
help.guide.telnet.title=Telnet
help.guide.telnet.body=• Plain Telnet and telnets (TLS). STARTTLS is not supported by the current library.\n• Automatic NAWS negotiation: the server is told the terminal size on every resize.\n• Terminal type configurable in Setup → TCP/IP…\n• SOCKS/HTTP proxy in Setup → Proxy…
help.guide.serial.title=Serial
help.guide.serial.body=• Pick the port from Setup → Serial port… or from New connection.\n• Standard speeds 300–921 600 bps; data bits, parity, stop bits and flow control are configurable.\n• DTR/RTS signals are visible and controllable in Control → Serial signals… (400 ms polling).\n• To send BREAK: Control → Send BREAK.
help.guide.tftp.title=TFTP
help.guide.tftp.body=• Client: File → Transfer → TFTP client… for PUT/GET with OACK, blksize and tsize.\n• Server: File → Transfer → TFTP server… (configurable root, per-file PUT/GET permissions).\n• Transfers stay alive even if you close the dialog: the "TFTP: N in progress" badge in the status bar opens the panel.\n• The "TFTP server :PORT" badge means the server is still up; only Stop turns it off.
help.guide.macros.title=Macros
help.guide.macros.body=• Editor: Control → Macro editor… (Ctrl+M).\n• Language: Groovy + MacroBaseScript bridge (send, expect, sleep, prompt, log, tftp_*).\n• Auto-login macro: Setup → Additional… → Auto-login macro.\n• Each session can carry its own macro (field in the protocol dialog).
help.guide.transfer.title=Transfers
help.guide.transfer.body=• XMODEM CRC-16: Control → Send XMODEM / Receive XMODEM.\n• Capture screen: File → Capture screen to PNG.\n• Export buffer (scrollback) to TXT: File → Export buffer.\n• Session log: Control → Start session log… (txt/html/raw format, size or time-based rotation).
help.guide.shortcuts.title=Shortcuts
help.guide.shortcuts.body=Factory defaults:\n  Ctrl+N        New empty tab\n  Ctrl+Shift+S  Serial connection\n  Ctrl+Shift+H  SSH connection\n  Ctrl+Shift+C  Copy (terminal)\n  Ctrl+Shift+V  Paste\n  Ctrl+M        Macro editor\n  Ctrl+W        Close tab\n  Ctrl+Q        Quit\n\nFull editable list under Setup → Shortcuts… or check Help → Keyboard shortcuts.

help.openSpec.missing.header=Specification file not found
help.openSpec.missing.body=The master spec was looked up at these paths and none of them exist:\n{0}\n\nThe documentation ships with the source code, not with the installed application.
help.reportIssue.header=How to report a problem
help.reportIssue.body=Copy the details block (Copy button) and attach it to your ticket or email. Include the exact reproduction steps and, if possible, the session log content.

